<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Chronological Alternating Digit Differs Bot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { text-align: center; color: #e31c25; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #e31c25; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #b8121a; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 4px; }
        .stat-box { font-size: 14px; font-weight: bold; }
        .logs { background: #222; color: #0f0; padding: 15px; border-radius: 4px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deriv Instant 1s Alternating Bot</h2>
    
    <label>Deriv API Token:</label>
    <input type="password" id="token" placeholder="Paste your free Virtual Account Token here">
    
    <div class="stats-grid">
        <div class="stat-box">Active Market: <span id="statMarket">1HZ10V</span></div>
        <div class="stat-box">Current Prediction: <span id="statPred">3</span></div>
        <div class="stat-box">Current Stake: $<span id="statStake">1.00</span></div>
        <div class="stat-box">Total Profit/Loss: $<span id="statProfit">0.00</span></div>
        <div class="stat-box">Target Profit: $6.00</div>
    </div>

    <button id="startBtn" onclick="startBot()">START TRADING</button>
    
    <h3>Activity Logs:</h3>
    <div class="logs" id="logPanel">> Payload structures updated to production spec. Ready to execute.</div>
</div>

<script>
    let ws;
    let isRunning = false;
    let processedContracts = [];

    const sMarkets = [
        "1HZ10V", "1HZ15V", "1HZ25V", "1HZ30V", "1HZ50V", 
        "1HZ75V", "1HZ90V", "1HZ100V", "1HZ150V", "1HZ200V", 
        "1HZ250V", "1HZ300V"
    ];
    let marketIndex = 0;

    // Completely bulletproof string mapping to eliminate chat parser glitches
    let currentDigit = 3;

    const baseStake = 1.0;
    let currentStake = 1.0;
    let totalProfit = 0.0;
    const targetProfit = 6.0;

    function addLog(message) {
        const panel = document.getElementById('logPanel');
        panel.innerHTML += `<br>> ${message}`;
        panel.scrollTop = panel.scrollHeight;
    }

    function updateUI() {
        document.getElementById('statMarket').innerText = sMarkets[marketIndex];
        document.getElementById('statPred').innerText = currentDigit;
        document.getElementById('statStake').innerText = currentStake.toFixed(2);
        document.getElementById('statProfit').innerText = totalProfit.toFixed(2);
        document.getElementById('statProfit').style.color = totalProfit >= 0 ? "green" : "red";
    }

    function startBot() {
        if (isRunning) {
            stopBotForce("Bot manually stopped by user.");
            return;
        }

        const token = document.getElementById('token').value.trim();
        if (!token) { addLog("ERROR: Please enter a valid API Token."); return; }

        isRunning = true;
        marketIndex = 0;
        currentDigit = 3;
        currentStake = baseStake;
        totalProfit = 0.0;
        processedContracts = [];
        
        document.getElementById('startBtn').innerText = "STOP BOT";
        updateUI();
        connectToDeriv(token);
    }

    function connectToDeriv(token) {
        const endpoint = "wss://://derivws.com";
        ws = new WebSocket(endpoint);

        ws.onopen = function() {
            addLog("Opening private connection stream to Deriv...");
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = function(msg) {
            const data = JSON.parse(msg.data);
            
            if (data.error) {
                addLog(`API ERROR: ${data.error.message}`);
                stopBotForce("Execution stopped due to backend error.");
                return;
            }

            if (data.msg_type === 'authorize') {
                addLog(`Authorized as ${data.authorize.email}. Running live tracking loops...`);
                ws.send(JSON.stringify({ forget_all: "proposal_open_contract" }));
                ws.send(JSON.stringify({ proposal_open_contract: 1, subscribe: 1 }));
                executeNextTradeLoop();
            }

            if (data.msg_type === 'proposal') {
                if (!isRunning) return;
                ws.send(JSON.stringify({ buy: data.proposal.id, price: data.proposal.ask_price }));
            }

            if (data.msg_type === 'buy') {
                addLog(`Order placed successfully on ${sMarkets[marketIndex]}. Checking results...`);
            }

            if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract) {
                const contract = data.proposal_open_contract;
                const cid = contract.contract_id;
                
                if (contract.is_expired && contract.status !== 'open' && !processedContracts.includes(cid)) {
                    processedContracts.push(cid); 
                    
                    const winAmount = parseFloat(contract.profit);
                    totalProfit += winAmount;
                    
                    if (winAmount > 0) {
                        addLog(`<span style="color: #0f0;">WIN! Return: +$${winAmount.toFixed(2)}</span>`);
                        currentStake = baseStake; 
                    } else {
                        addLog(`<span style="color: #ff3333;">LOSS! Deficit: $${winAmount.toFixed(2)}</span>`);
                        currentStake = currentStake * 11; 
                    }

                    updateUI();

                    if (totalProfit >= targetProfit) {
                        stopBotForce(`GOAL ACHIEVED! Final Net Profit: $${totalProfit.toFixed(2)}`);
                        return;
                    }

                    rotateParameters();
                }
            }
        };
    }

    function executeNextTradeLoop() {
        if (!isRunning) return;
        
        const activeMarket = sMarkets[marketIndex];
        
        addLog("Sending Proposal -> <b>" + activeMarket + "</b> | Prediction: <b>" + currentDigit + "</b> | Stake: <b>$" + currentStake.toFixed(2) + "</b>");

        ws.send(JSON.stringify({
            proposal: 1,
            amount: currentStake,
            basis: "stake",
            contract_type: "DIGITDIFF",
            currency: "USD",
            duration: 1,
            duration_unit: "t",
            barrier: String(currentDigit), 
            symbol: activeMarket
        }));
    }

    function rotateParameters() {
        if (!isRunning) return;

        // 1. Shift Market Pointer
        marketIndex++;
        if (marketIndex >= sMarkets.length) {
            marketIndex = 0;
            addLog("Finished Volatility 300 (1s). Looping back to Volatility 10 (1s)...");
        }

        // 2. Clear Mathematical Digit Cycle Rotation
        currentDigit++;
        if (currentDigit > 7) {
            currentDigit = 3;
            addLog("Prediction cycle completed. Resetting digit target back to 3.");
        }

        updateUI();
        executeNextTradeLoop(); 
    }

    function stopBotForce(reason) {
        isRunning = false;
        document.getElementById('startBtn').innerText = "START TRADING";
        addLog("<b>SYSTEM STATUS: " + reason + "</b>");
        if(ws) {
            ws.send(JSON.stringify({ forget_all: "proposal_open_contract" }));
            ws.close();
        }
    }
</script>
</body>
</html>
